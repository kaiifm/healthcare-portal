<!DOCTYPE html>
<html>
<head>
  <title>Patient Form</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.form-box {
  width: 400px;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.input-group {
  position: relative;
  margin-bottom: 20px;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 5px;
  outline: none;
}

.input-group label {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: white;
  padding: 0 5px;
  color: #999;
  transition: 0.3s;
  pointer-events: none;
}

.input-group input:focus + label,
.input-group input:valid + label {
  top: -10px;
  font-size: 12px;
  color: #4CAF50;
}

.drop-area {
  border: 2px dashed #4CAF50;
  padding: 20px;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 15px;
  color: #666;
}

.file-btn {
  display: inline-block;
  padding: 8px 15px;
  background: #4CAF50;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

.submit-btn {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.submit-btn:hover {
  background: #333;
}






</style>
</head>
<body>



  <script>
    document.getElementById("patientForm").addEventListener("submit", function(e) {
      if (!this.checkValidity()) {
        e.preventDefault();
        alert("Please fill all patient details ❗");
      } else {
        alert("Form Submitted Successfully ✅");
      }
    });
  </script>

</body>
</html>
